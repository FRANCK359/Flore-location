# ===================================
# APPLICATION
# ===================================
spring.application.name=evenement-docker

# ===================================
# BASE DE DONNEES
# ===================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/event_location_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# ===================================
# JPA
# ===================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===================================
# JWT
# ===================================
app.jwt.secret=${JWT_SECRET:change-me}
app.jwt.expiration=86400000

# ===================================
# SERVEUR
# ===================================
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# ===================================
# EMAIL - CONFIGURATION (STANDARD + FALLBACK)
# ===================================
spring.mail.host=${SPRING_MAIL_HOST:${MAIL_HOST:smtp.gmail.com}}
spring.mail.port=${SPRING_MAIL_PORT:${MAIL_PORT:587}}
spring.mail.username=${SPRING_MAIL_USERNAME:${MAIL_USERNAME:}}
spring.mail.password=${SPRING_MAIL_PASSWORD:${MAIL_PASSWORD:}}

# Propriétés SMTP
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Configuration supplémentaire
spring.mail.protocol=smtp
spring.mail.test-connection=false
spring.mail.default-encoding=UTF-8

# ===================================
# EMAIL - EXPÉDITEUR
# ===================================
app.email.from=${APP_EMAIL_FROM:${MAIL_FROM:noreply@localhost}}
app.email.from-name=${APP_EMAIL_FROM_NAME:${MAIL_FROM_NAME:Location Événement}}
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ===================================
# THYMELEAF - POUR LES TEMPLATES EMAIL
# ===================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=true

# ===================================
# LOGGING
# ===================================
logging.level.com.location.evenement=DEBUG
logging.level.org.springframework.mail=INFO