# ===================================
# EMAIL - CONFIGURATION DE TEST (MAILTRAP)
# ===================================
# Pour les tests, utilisez Mailtrap (https://mailtrap.io)
spring.mail.host=${SPRING_MAIL_HOST:${MAIL_HOST:smtp.mailtrap.io}}
spring.mail.port=${SPRING_MAIL_PORT:${MAIL_PORT:2525}}
spring.mail.username=${SPRING_MAIL_USERNAME:${MAIL_USERNAME:}}
spring.mail.password=${SPRING_MAIL_PASSWORD:${MAIL_PASSWORD:}}

# Propriétés SMTP
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Configuration supplémentaire
spring.mail.protocol=smtp
spring.mail.test-connection=true

# ===================================
# EMAIL - EXPÉDITEUR
# ===================================
app.email.from=${APP_EMAIL_FROM:${MAIL_FROM:noreply@localhost}}
app.email.from-name=${APP_EMAIL_FROM_NAME:${MAIL_FROM_NAME:Location Événement (TEST)}}
app.base-url=${APP_BASE_URL:http://localhost:8080}