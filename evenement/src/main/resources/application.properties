# ===================================
# SERVEUR
# ===================================
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# ===================================
# EMAIL - CONFIGURATION COMPLÈTE
# ===================================
# Supporte SPRING_MAIL_* (standard Spring) et fallback sur MAIL_* (compat)
spring.mail.host=${SPRING_MAIL_HOST:${MAIL_HOST:smtp.gmail.com}}
spring.mail.port=${SPRING_MAIL_PORT:${MAIL_PORT:587}}
spring.mail.username=${SPRING_MAIL_USERNAME:${MAIL_USERNAME:}}
spring.mail.password=${SPRING_MAIL_PASSWORD:${MAIL_PASSWORD:}}

# Propriétés SMTP
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Configuration supplémentaire
spring.mail.protocol=smtp
spring.mail.test-connection=false
spring.mail.default-encoding=UTF-8

# ===================================
# EMAIL - EXPÉDITEUR
# ===================================
# Supporte APP_EMAIL_* (propre) et fallback sur MAIL_FROM / MAIL_FROM_NAME
app.email.from=${APP_EMAIL_FROM:${MAIL_FROM:noreply@localhost}}
app.email.from-name=${APP_EMAIL_FROM_NAME:${MAIL_FROM_NAME:Location Événement}}

# URL de base pour les liens dans les emails
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ===================================
# THYMELEAF - POUR LES TEMPLATES EMAIL
# ===================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=true